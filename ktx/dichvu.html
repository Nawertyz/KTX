<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản Lý Tiền Điện, Nước</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="dichvu.css">
</head>
<body>
    <header>
        <nav>
           <a href="ttphong.html">Quản Lý Phòng Ký Túc Xá</a>
            <a href="sv.html">Quản Lý Sinh Viên</a>
            <a href="tienphong.html">Quản Lý Hóa Đơn</a>
            <a href="dichvu.html">Quản Lý Tiền Điện, Nước, Dịch Vụ</a>
            <a href="../index.html" onclick="logout()">Đăng xuất</a>
        </nav>
    </header>
    <h1>Tiền Điện, Nước</h1>
    <form id="dichvu-form">        
        <label for="phong">Phòng:</label>
        <input type="number" id="phong" required>

        <label for="dien">Tiêu thụ điện (kWh):</label>
        <input type="number" id="dien" required >

        <label for="nuoc">Tiêu thụ nước (m³):</label>
        <input type="number" id="nuoc" required>

        <button type="submit">+Thêm</button>
    </form>
    <div id="thongbao" class="hidden"></div>
    <button id="clear-local-storage">Xóa tất cả dữ liệu</button>
    <!-- Modal xác nhận -->
</div>
    <table id="dichvu-table">
        <thead>
            <tr>
                <th>Phòng</th>
                <th>Điện (VND)</th>
                <th>Nước (VND)</th>
                <th>Dịch Vụ (VND)</th>
                <th>Ngày Tạo</th>
                <th>Trạng Thái</th>
                <th>Hành Động</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>101</td>
                <td>150.000</td>
                <td>100.000</td>
                <td>100.000</td>
                <td>01/10/2024</td>
                <td>Đã thanh toán</td>
            </tr>
            <tr>
                <td>102</td>
                <td>120.000</td>
                <td>120.000</td>
                <td>100.000</td>
                <td>01/10/2024</td>
                <td>Đã thanh toán</td>
            </tr>
        </tbody>
    </table>
    <div id="confirm-modal" class="modal hidden">
        <div class="modal-content">
            <span id="confirm-message"></span>
            <div class="button-container">
                <button id="confirm-yes">Có</button>
                <button id="confirm-no">Không</button>
            </div>
        </div>
    </div>
</div>

<script src="dichvu.js"></script>
</body>
</html>
